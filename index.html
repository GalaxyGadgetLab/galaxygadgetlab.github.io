<!DOCTYPE html>

<body>
    <div class="card">
        <h1>銀河ガジェット研究所</h1>

        <div class="project-list">
            <div class="project-item">
                <h3>銀河ガジェット1号: 黎明の観測者（Daybreak Observer）</h3>
                <p>ESP32を用いた目覚まし時計だ．スピーカを搭載した親機を枕元に設置し，停止するための子機をリビングに設置することで，強制的にリビングへ移動することになる．共に新時代の幕開けを観測しようじゃないか．</p>
            </div>
            </div>
